name: Deploy to EC2

on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-east-1
  INSTANCE_ID: i-0889502e3ef3f5544
  SITE_DIR: /var/www/jackstuehler.com/html

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Get AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::425827481225:role/GitHubActionsDeployRole
          aws-region: ${{ env.AWS_REGION }}

      - name: Send deploy command
        id: send
        run: |
          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "$INSTANCE_ID" \
            --document-name "AWS-RunShellScript" \
            --comment "Deploy ${GITHUB_SHA::7}" \
            --parameters commands="[
              'set -eu',
              'sudo -u deploy git -C $SITE_DIR fetch --all --prune',
              'sudo -u deploy git -C $SITE_DIR reset --hard $GITHUB_SHA',
              'sudo -u deploy git -C $SITE_DIR clean -fd',
              'echo Deployed $GITHUB_SHA'
            ]" \
            --query "Command.CommandId" --output text)
          echo "command_id=$COMMAND_ID" >> "$GITHUB_OUTPUT"
          echo "Sent command $COMMAND_ID"

      - name: Wait for the result
        run: |
          aws ssm wait command-executed \
            --command-id "${{ steps.send.outputs.command_id }}" \
            --instance-id "$INSTANCE_ID" || true

          aws ssm get-command-invocation \
            --command-id "${{ steps.send.outputs.command_id }}" \
            --instance-id "$INSTANCE_ID" \
            --query "{Status:Status,Output:StandardOutputContent,Error:StandardErrorContent}" \
            --output json | tee result.json

          [ "$(jq -r '.Status' result.json)" = "Success" ] || exit 1
