name: Deploy to EC2

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  id-token: write # required for OIDC
  contents: read

env:
  AWS_REGION: us-east-1
  INSTANCE_ID: i-0123456789abcdef0
  SITE_DIR: /var/www/jackstuehler.com

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Assume AWS role via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::111122223333:role/GitHubActionsDeployRole
          aws-region: ${{ env.AWS_REGION }}

      - name: Trigger deploy via SSM
        id: send
        run: |
          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "$INSTANCE_ID" \
            --document-name "AWS-RunShellScript" \
            --comment "Deploy ${GITHUB_SHA::7} from ${GITHUB_REF_NAME}" \
            --parameters commands="[
              'set -euo pipefail',
              'cd $SITE_DIR',
              'git fetch --all --prune',
              'git reset --hard $GITHUB_SHA',
              'chown -R www-data:www-data $SITE_DIR'
            ]" \
            --query "Command.CommandId" --output text)
          echo "command_id=$COMMAND_ID" >> "$GITHUB_OUTPUT"

      - name: Wait for completion
        run: |
          aws ssm wait command-executed \
            --command-id "${{ steps.send.outputs.command_id }}" \
            --instance-id "$INSTANCE_ID" || true

          aws ssm get-command-invocation \
            --command-id "${{ steps.send.outputs.command_id }}" \
            --instance-id "$INSTANCE_ID" \
            --query "{Status:Status,Output:StandardOutputContent,Error:StandardErrorContent}" \
            --output json | tee result.json

          STATUS=$(jq -r '.Status' result.json)
          [ "$STATUS" = "Success" ] || exit 1
